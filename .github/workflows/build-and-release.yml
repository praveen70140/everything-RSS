name: Build and Release Android APK

on:
  push:
    branches:
      - '**'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ⚡ Cache pub dependencies
      - name: Cache Flutter pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-cache-

      # ⚡ Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 🩹 isar namespace patch (still cursed, still needed)
      - name: Patch isar_flutter_libs namespace
        run: |
          find ~/.pub-cache/hosted/pub.dev -name "build.gradle" | grep isar_flutter_libs | xargs sed -i -e '/android {/a\    namespace "dev.isar.isar_flutter_libs"' || echo "No patch applied"

      # 🔥 Optimized build
      - name: Build APK (split + stripped)
        run: flutter build apk --release --split-per-abi --split-debug-info=build/debug-info

      - name: Get short SHA
        id: slug
        run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

      # 📦 Collect APKs
      - name: Collect APKs
        run: |
          mkdir release-apks
          cp build/app/outputs/flutter-apk/*.apk release-apks/

      # 🚀 Release all variants
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.slug.outputs.sha8 }}
          name: Build ${{ steps.slug.outputs.sha8 }}
          body: |
            Optimized split APK release
            Commit: ${{ github.sha }}
          files: release-apks/*.apk
